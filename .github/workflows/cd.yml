name: CD Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Optional version override (without v prefix)
        required: false
        type: string
      dataset_tag:
        description: Optional dataset tag override (for verification)
        required: false
        type: string
      npm_tag:
        description: npm dist-tag
        required: false
        default: latest
        type: choice
        options:
          - latest
          - next

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(node -e "console.log(require('./package.json').version)")"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "Unable to resolve version." >&2
            exit 1
          fi

          if [[ -n "${{ inputs.dataset_tag }}" ]]; then
            DATASET_TAG="${{ inputs.dataset_tag }}"
          else
            DATASET_TAG="$(node -e "console.log(require('./src/constants').DEFAULT_DATASET_TAG)")"
          fi

          if [[ -n "${{ inputs.npm_tag }}" ]]; then
            NPM_TAG="${{ inputs.npm_tag }}"
          else
            NPM_TAG="latest"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dataset_tag=$DATASET_TAG" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"

          echo "Resolved version: $VERSION"
          echo "Resolved dataset tag: $DATASET_TAG"
          echo "Resolved npm tag: $NPM_TAG"

      - name: Install dependencies
        run: npm ci

      - name: Verify release metadata
        run: node scripts/verify-release.mjs --version "${{ steps.meta.outputs.version }}" --dataset-tag "${{ steps.meta.outputs.dataset_tag }}"

      - name: Run tests
        run: npm test

      - name: Validate package contents
        run: npm run test:package

      - name: Publish to npm
        run: npm publish --access public --tag "${{ steps.meta.outputs.npm_tag }}"

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server metadata to MCP Registry
        run: ./mcp-publisher publish
