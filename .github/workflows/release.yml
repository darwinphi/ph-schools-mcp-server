name: Release MCP Server

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (must match package.json and server.json)
        required: true
        type: string
      dataset_tag:
        description: Pinned dataset tag in src/constants.js (for reproducible sync)
        required: true
        type: string
      npm_tag:
        description: npm dist-tag
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify release metadata
        run: node scripts/verify-release.mjs --version "${{ inputs.version }}" --dataset-tag "${{ inputs.dataset_tag }}"

      - name: Run tests
        run: npm test

      - name: Validate package contents
        run: npm run test:package

      - name: Publish to npm
        run: npm publish --access public --tag "${{ inputs.npm_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server metadata to MCP Registry
        run: ./mcp-publisher publish
